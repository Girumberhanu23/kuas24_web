version: 1
frontend:
  phases:
    preBuild:
      commands:
        - env | grep -e NEXT_PUBLIC_BACKEND_API_URL -e BACKEND_API_URL -e API_SPORTS_KEY -e API_SPORTS_BASE_URL > .env.production
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
